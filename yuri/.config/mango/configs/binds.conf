# App
bind = super,return,spawn,footclient
bind = super,e,spawn,footclient yazi
bind = super,b,spawn,brave-origin-nightly --ozone-platform=wayland
bind = super+shift,e,spawn,nautilus -w
bind = super+shift,a,spawn,footclient --title ft pulsemixer
bind = super+shift,b,spawn,footclient --title ft bluetui
bind = ctrl+shift,escape,spawn,footclient --title ft btop

# Vicinae
bind  = super,space,spawn,vicinae toggle
bind  = super,v,spawn,vicinae vicinae://launch/clipboard/history
bind  = super,x,spawn,vicinae vicinae://launch/wm/switch-windows
bind  = super,period,spawn,vicinae vicinae://launch/core/search-emojis
bind  = super+shift,w,spawn,vicinae vicinae://launch/@sovereign/store.vicinae.awww-switcher/wpgrid
bindl = super+alt,w,spawn,vicinae vicinae://launch/@sovereign/store.vicinae.awww-switcher/wprandom

# Misc
bindl = super,n,spawn,notify-send 'Haii :3' 'This is a test notification :3'
bindl = alt,space,spawn,mb-kblayout
bind  = super+alt,l,spawn,mb-lock
bind  = super+shift,c,spawn,mb-picker
bindl = super+shift,r,spawn,mb-reload
bindl = super+shift,p,sleep_toggle_monitor,eDP-1

# Screenshot and Recording
bindl = none,print,spawn,mb-screenshot output
bind  = alt,print,spawn,mb-screenshot window
bind  = shift,print,spawn,mb-screenshot region
bindl = ctrl,print,spawn,mb-record

# Window
bind = alt,tab,togglejump
bind = super,w,togglejump
bind = super,q,killclient
bind = super,c,centerwin
bind = super,p,toggleglobal
bind = super,t,togglefloating
bind = super+shift,t,toggle_all_floating
bind = super,f,togglemaximizescreen
bind = super+shift,f,togglefullscreen
bind = super+ctrl,tab,focuslast

mousebind = super,btn_left,moveresize,curmove
mousebind = super,btn_right,moveresize,curresize
mousebind = super+ctrl,btn_right,killclient
mousebind = super,btn_middle,togglemaximizescreen
mousebind = super+shift,btn_middle,toggleglobal

# 3-finger: Workspace navigation
gesturebind = none,left,3,viewtoright_have_client
gesturebind = none,right,3,viewtoleft_have_client
gesturebind = none,up,3,togglejump
gesturebind = none,down,3,togglejump

# Layout
circle_layout = fair,scroller,grid,tile
bind = super+alt,tab,switch_layout
bind = super+alt,1,setlayout,fair
bind = super+alt,2,setlayout,scroller
bind = super+alt,3,setlayout,grid
bind = super+alt,4,setlayout,tile

# Tile
bind = super,z,zoom
bind = super,m,zoom
bind = super,bracketleft,incnmaster,-1
bind = super,bracketright,incnmaster,+1

# Scroller
bind = super,backslash,switch_proportion_preset
bind = super+shift,backslash,set_proportion,0.9
bind = super,bracketleft,scroller_stack,left
bind = super,bracketright,scroller_stack,right

# Focus
bind = super,h,focusdir,left
bind = super,j,focusdir,down
bind = super,k,focusdir,up
bind = super,l,focusdir,right
bind = super,left,focusdir,left
bind = super,down,focusdir,down
bind = super,up,focusdir,up
bind = super,right,focusdir,right

# Exchange
bind = super+shift,h,exchange_client,left
bind = super+shift,j,exchange_client,down
bind = super+shift,k,exchange_client,up
bind = super+shift,l,exchange_client,right
bind = super+shift,left,exchange_client,left
bind = super+shift,down,exchange_client,down
bind = super+shift,up,exchange_client,up
bind = super+shift,right,exchange_client,right

# Resize
bind = super+ctrl,h,resizewin,-30,0
bind = super+ctrl,j,resizewin,0,-30
bind = super+ctrl,k,resizewin,0,30
bind = super+ctrl,l,resizewin,30,0
bind = super+ctrl,left,resizewin,-30,0
bind = super+ctrl,down,resizewin,0,-30
bind = super+ctrl,up,resizewin,0,30
bind = super+ctrl,right,resizewin,30,0

# Cycle Tag
bind = super,tab,viewtoright_have_client
bind = super+shift,tab,viewtoleft_have_client

axisbind = super,up,viewtoleft_have_client
axisbind = super,down,viewtoright_have_client

# View Tag
bind = super,1,view,1
bind = super,2,view,2
bind = super,3,view,3
bind = super,4,view,4
bind = super,5,view,5
bind = super,6,view,6
bind = super,7,view,7
bind = super,8,view,8
bind = super,9,view,9

# Tag
bind = super+shift,1,tag,1
bind = super+shift,2,tag,2
bind = super+shift,3,tag,3
bind = super+shift,4,tag,4
bind = super+shift,5,tag,5
bind = super+shift,6,tag,6
bind = super+shift,7,tag,7
bind = super+shift,8,tag,8
bind = super+shift,9,tag,9

# Volume
bindl = none,XF86AudioRaiseVolume,spawn,mb-vol up
bindl = none,XF86AudioLowerVolume,spawn,mb-vol down
bindl = shift,XF86AudioRaiseVolume,spawn,mb-vol up-fine
bindl = shift,XF86AudioLowerVolume,spawn,mb-vol down-fine
bindl = alt,XF86AudioRaiseVolume,spawn,mb-vol music-up
bindl = alt,XF86AudioLowerVolume,spawn,mb-vol music-down
bindl = none,XF86AudioMute,spawn,mb-vol mute
bindl = none,XF86AudioMicMute,spawn,mb-vol mic-mute

# Brightness
bindl = none,XF86MonBrightnessUp,spawn,mb-bright up
bindl = none,XF86MonBrightnessDown,spawn,mb-bright down

# Media
bindl = none,XF86AudioNext,spawn,playerctl next
bindl = none,XF86AudioPrev,spawn,playerctl previous
bindl = none,XF86AudioPlay,spawn,playerctl play-pause
bindl = super+alt,n,spawn,playerctl next
bindl = super+alt,b,spawn,playerctl previous
bindl = super+alt,p,spawn,playerctl play-pause

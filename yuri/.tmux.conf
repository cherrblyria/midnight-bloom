# Fix Vim ESC delay
set -sg escape-time 0

# Enable mouse support
set -g mouse on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Increase scrollback buffer
set -g history-limit 5000

## Key Binds
# Prefix
set -g prefix C-s
bind C-s send-prefix
unbind C-b

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style quick pane navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

## Copy Mode
# Use vi keys
setw -g mode-keys vi

bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'V' send-keys -X select-line
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle

## Plugins
# TPM
set -g @plugin 'tmux-plugins/tpm'

# Sensible
set -g @plugin 'tmux-plugins/tmux-sensible'

# Continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
unbind S
unbind R
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Vim Navigator
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""

# Mode Indicator
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @mode_indicator_prefix_mode_style 'fg=blue,bg=default,bold'
set -g @mode_indicator_copy_mode_style 'fg=yellow,bg=default,bold'
set -g @mode_indicator_sync_mode_style 'fg=red,bg=default,bold'
set -g @mode_indicator_empty_mode_style 'fg=cyan,bg=default,bold'

## Status Bar
# Status bar position
set -g status-position top

# Default Colors
set -g status-fg white
set -g status-style bg=default
set -g status-left-style bg=default
set -g status-right-style bg=default
set -g window-status-current-style bg=default

# Left Modules
set -g status-left-length 30
set -g status-left '#[fg=green]  #S #[fg=green]#[fg=white]|#[fg=yellow] #I:#P #[fg=white]| '

# Right Modules
set -g status-right-length 120
set -g status-right '#(cd "#{pane_current_path}" && git branch --show-current 2>/dev/null | sed "s/.*/#[fg=magenta] &#[fg=white] | /")#[fg=white] %H:%M | #[fg=green] #(cat /sys/class/power_supply/BAT0/capacity)%% #[fg=white]|#{tmux_mode_indicator}'

# Window Format
set -g window-status-format '#[dim]#W'
set -g window-status-current-format '#W'

## Pane
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=magenta'

## Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
